default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-json
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-yaml
      - id: detect-private-key
      - id: mixed-line-ending

  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff lint
        entry: uv run --locked ruff check --fix --exit-non-zero-on-fix
        language: unsupported
        types_or: [python, pyi]
        require_serial: true

      - id: ruff-format
        name: Ruff format
        entry: uv run --locked ruff format
        language: unsupported
        types_or: [python, pyi]
        require_serial: true

      - id: ty
        name: ty
        entry: uv run --locked ty check src/vosfs
        language: unsupported
        pass_filenames: false
        always_run: true

      - id: pymarkdown
        name: PyMarkdown
        entry: uv run --locked pymarkdown --disable-rules MD013 scan
        language: unsupported
        types: [markdown]
        exclude: ^CHANGELOG\.md$

      - id: commitizen
        name: Commitizen message
        entry: uv run --locked cz check --allow-abort --commit-msg-file
        language: unsupported
        stages: [commit-msg]
