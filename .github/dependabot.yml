version: 2
updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: build(deps)
      prefix-development: build(deps-dev)
    groups:
      python-dependencies:
        patterns: ["*"]

  - package-ecosystem: pre-commit
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci(deps)
    groups:
      pre-commit-hooks:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci(deps)
    groups:
      github-actions:
        patterns: ["*"]
