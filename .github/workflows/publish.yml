name: Publish Code

on:
  repository_dispatch:
    types: [release-build]

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.client_payload.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Validate release dispatch
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ github.event.client_payload.sha }}
          RELEASE_TAG: ${{ github.event.client_payload.tag_name }}
        run: |
          if [[ "$GITHUB_RUN_ATTEMPT" != "1" ]]; then
            echo "failed code releases are not resumed; publish the next patch" >&2
            exit 1
          fi
          if [[ ! "$RELEASE_TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "release tag must be an exact vX.Y.Z tag" >&2
            exit 1
          fi
          if [[ ! "$RELEASE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "release dispatch requires a full commit SHA" >&2
            exit 1
          fi
          if [[ "$(gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft)" != "true" ]]; then
            echo "release $RELEASE_TAG is not the draft created by this release run" >&2
            exit 1
          fi

      - name: Check out the released tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.client_payload.tag_name }}

      - name: Verify released commit
        env:
          RELEASE_SHA: ${{ github.event.client_payload.sha }}
        run: test "$(git rev-parse HEAD)" = "$RELEASE_SHA"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Build release distributions
        run: uv build

      - name: Attach distributions to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.client_payload.tag_name }}
        run: gh release upload "$RELEASE_TAG" dist/*.whl dist/*.tar.gz

      - name: Publish the complete GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.client_payload.tag_name }}
        run: gh release edit "$RELEASE_TAG" --draft=false
