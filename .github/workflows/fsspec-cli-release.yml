name: fsspec-cli Release

on:
  workflow_run:
    workflows: [fsspec-cli live OpenCADC]
    types: [completed]
    branches: [main]

permissions:
  actions: read
  contents: read

concurrency:
  group: fsspec-cli-release-main
  cancel-in-progress: false

jobs:
  orchestrate:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    permissions:
      actions: read
      contents: write
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Verify exact current-main CI and live evidence
        env:
          GH_TOKEN: ${{ github.token }}
          LIVE_RUN_ID: ${{ github.event.workflow_run.id }}
          VALIDATED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          [[ "$LIVE_RUN_ID" =~ ^[0-9]+$ ]]
          [[ "$VALIDATED_SHA" =~ ^[0-9a-f]{40}$ ]]

          main_sha="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/main" --jq .object.sha)"
          [[ "$main_sha" == "$VALIDATED_SHA" ]]

          evidence_dir="$RUNNER_TEMP/fsspec-cli-live-evidence"
          mkdir -p "$evidence_dir"
          gh run download "$LIVE_RUN_ID" \
            --name "fsspec-cli-live-evidence-$VALIDATED_SHA" \
            --dir "$evidence_dir"
          evidence_file="$evidence_dir/fsspec-cli-live-evidence-$VALIDATED_SHA.json"
          [[ -f "$evidence_file" ]]

          live_run_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$LIVE_RUN_ID"
          jq -e \
            --arg live_run_url "$live_run_url" \
            --arg validated_sha "$VALIDATED_SHA" \
            '.classification == "pass" and
             .gate_kind == "live OpenCADC" and
             .command_profile == "plain ls" and
             .source_mode == "vosfs / native async" and
             .commit == $validated_sha and
             .run_url == $live_run_url and
             (.ci_run_id | test("^[0-9]+$")) and
             (.ci_run_url | type == "string")' \
            "$evidence_file" >/dev/null

          CI_RUN_ID="$(jq -r .ci_run_id "$evidence_file")"
          ci_run_file="$RUNNER_TEMP/fsspec-cli-ci-run.json"
          gh api "repos/$GITHUB_REPOSITORY/actions/runs/$CI_RUN_ID" > "$ci_run_file"
          jq -e \
            --arg validated_sha "$VALIDATED_SHA" \
            '.name == "CI" and
             .conclusion == "success" and
             .head_branch == "main" and
             .head_sha == $validated_sha' \
            "$ci_run_file" >/dev/null

      - name: Open or update the fsspec-cli release pull request
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          target-branch: main
          config-file: fsspec-cli-release-please-config.json
          manifest-file: .fsspec-cli-release-please-manifest.json

      - name: Dispatch fsspec-cli publication
        if: steps.release.outputs['src/fsspec-cli--release_created'] == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ steps.release.outputs['src/fsspec-cli--sha'] }}
          RELEASE_TAG: ${{ steps.release.outputs['src/fsspec-cli--tag_name'] }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_TAG" =~ ^fsspec-cli-v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]
          [[ "$RELEASE_SHA" =~ ^[0-9a-f]{40}$ ]]
          gh api --method POST "repos/$GITHUB_REPOSITORY/dispatches" \
            -f event_type=fsspec-cli-release-build \
            -f "client_payload[tag_name]=$RELEASE_TAG" \
            -f "client_payload[sha]=$RELEASE_SHA"
