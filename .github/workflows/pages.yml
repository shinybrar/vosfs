name: Pages

on:
  repository_dispatch:
    types: [docs-publish]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing vX.Y.Z tag whose docs should be republished
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Select documentation target
        id: target
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.client_payload.tag_name || inputs.release_tag }}
          TARGET: ${{ github.event.client_payload.target }}
          VALIDATED_SHA: ${{ github.event.client_payload.sha }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" || "$TARGET" == "release" ]]; then
            if [[ ! "$RELEASE_TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
              echo "release tag must be an exact vX.Y.Z tag" >&2
              exit 1
            fi
            echo "ref=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "version=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          else
            if [[ "$TARGET" != "dev" ]]; then
              echo "documentation target must be dev or release" >&2
              exit 1
            fi
            if [[ ! "$VALIDATED_SHA" =~ ^[0-9a-f]{40}$ ]]; then
              echo "dev documentation requires a full commit SHA" >&2
              exit 1
            fi
            echo "ref=$VALIDATED_SHA" >> "$GITHUB_OUTPUT"
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out documentation source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          ref: ${{ steps.target.outputs.ref }}

      - name: Verify documentation source
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE: ${{ steps.target.outputs.release }}
          RELEASE_TAG: ${{ steps.target.outputs.version }}
          VALIDATED_SHA: ${{ github.event.client_payload.sha }}
        run: |
          if [[ "$RELEASE" == "true" ]]; then
            gh release view "$RELEASE_TAG" >/dev/null
            test "$(git rev-parse HEAD)" = "$(git rev-parse "$RELEASE_TAG^{commit}")"
            if [[ -n "$VALIDATED_SHA" ]]; then
              test "$(git rev-parse HEAD)" = "$VALIDATED_SHA"
            fi
          else
            test "$(git rev-parse HEAD)" = "$VALIDATED_SHA"
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Install locked documentation toolchain
        run: uv sync --locked

      - name: Strictly build documentation
        run: uv run --locked zensical build --strict --clean

      - name: Publish documentation
        env:
          RELEASE: ${{ steps.target.outputs.release }}
          VERSION: ${{ steps.target.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ "$RELEASE" == "true" ]]; then
            uv run --locked mike deploy \
              --config-file zensical.toml \
              --remote origin \
              --branch gh-pages \
              --push \
              --update-aliases \
              "$VERSION" latest
            uv run --locked mike set-default \
              --config-file zensical.toml \
              --remote origin \
              --branch gh-pages \
              --push \
              latest
          else
            uv run --locked mike deploy \
              --config-file zensical.toml \
              --remote origin \
              --branch gh-pages \
              --push \
              --update-aliases \
              dev
          fi

          uv run --locked mike list --config-file zensical.toml
