name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, labeled, unlabeled, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false
          python-version: "3.12"

      - name: Check exact lockfile
        run: uv lock --check

      - name: Run all pre-commit hooks
        run: uv run pre-commit run --all-files

      - name: Build strict documentation
        run: uv run zensical build --strict --clean

      - name: Build package distributions
        run: uv build

  metadata:
    name: Pull request metadata
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
    steps:
      - name: Check out trusted policy
        if: github.event_name == 'pull_request'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: .policy
          persist-credentials: false

      - name: Install uv and Python
        if: github.event_name == 'pull_request'
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false
          python-version: "3.12"

      - name: Validate Conventional Commit title
        if: github.event_name == 'pull_request'
        working-directory: .policy
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: uv run --locked cz check --message "$PR_TITLE"

      - name: Query parsed closing references
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          REPOSITORY: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh api graphql --paginate --slurp \
            -f query='query($owner: String!, $repository: String!, $number: Int!, $endCursor: String) {
              repository(owner: $owner, name: $repository) {
                pullRequest(number: $number) {
                  closingIssuesReferences(first: 100, after: $endCursor) {
                    nodes {
                      number
                      repository { nameWithOwner }
                    }
                    pageInfo { hasNextPage endCursor }
                  }
                }
              }
            }' \
            -F owner="$OWNER" \
            -F repository="$REPOSITORY" \
            -F number="$PR_NUMBER" \
            > "$RUNNER_TEMP/closing-references.json"

      - name: Enforce repository-local issue link
        if: github.event_name == 'pull_request'
        working-directory: .policy
        run: >-
          uv run --locked python scripts/check_pr_metadata.py
          "$GITHUB_EVENT_PATH" "$RUNNER_TEMP/closing-references.json"

      - name: Accept non-pull-request trigger
        if: github.event_name != 'pull_request'
        run: echo "Pull-request metadata does not apply to this trigger."

  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.10"
          - os: ubuntu-latest
            python: "3.11"
          - os: ubuntu-latest
            python: "3.12"
          - os: ubuntu-latest
            python: "3.13"
          - os: ubuntu-latest
            python: "3.14"
          - os: macos-latest
            python: "3.12"
          - os: windows-latest
            python: "3.12"
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false
          python-version: ${{ matrix.python }}

      - name: Run deterministic offline tests
        run: uv run pytest

  live-integration:
    name: Live OpenCADC integration gate
    # Runs only on trusted default-branch pushes and manual dispatch, never on
    # pull requests (no pull_request_target), and only when the repository opts
    # in with the VOSFS_LIVE_GATE variable. Secrets are never exposed to forks.
    if: >-
      vars.VOSFS_LIVE_GATE == 'true' &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'push' && github.ref == 'refs/heads/main'))
    runs-on: ubuntu-latest
    env:
      VOSFS_TEST_ENDPOINT: ${{ vars.VOSFS_TEST_ENDPOINT || 'https://staging.canfar.net/arc' }}
      VOSFS_TEST_ROOT: ${{ vars.VOSFS_TEST_ROOT }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false
          python-version: "3.12"

      - name: Mint a short-lived proxy certificate
        env:
          CADC_USERNAME: ${{ secrets.CADC_USERNAME }}
          CADC_PASSWORD: ${{ secrets.CADC_PASSWORD }}
        run: |
          set -euo pipefail
          umask 077
          netrc="$RUNNER_TEMP/.netrc"
          printf 'machine ws-cadc.canfar.net login %s password %s\n' \
            "$CADC_USERNAME" "$CADC_PASSWORD" > "$netrc"
          chmod 600 "$netrc"
          uv run --with cadcutils cadc-get-cert \
            --netrc-file "$netrc" \
            --cert-outfile "$RUNNER_TEMP/proxy.pem" > /dev/null 2>&1
          chmod 600 "$RUNNER_TEMP/proxy.pem"
          rm -f "$netrc"

      - name: Run the credential-gated live suite
        env:
          VOSFS_CERT_FILE: ${{ runner.temp }}/proxy.pem
        run: uv run --with cadcutils pytest -m integration

      - name: Remove the proxy certificate
        if: always()
        run: rm -f "$RUNNER_TEMP/proxy.pem" "$RUNNER_TEMP/.netrc"

  required:
    name: Required
    if: always()
    needs: [quality, metadata, test]
    runs-on: ubuntu-latest
    steps:
      - name: Require every dependency to succeed
        env:
          METADATA_RESULT: ${{ needs.metadata.result }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          TEST_RESULT: ${{ needs.test.result }}
        run: |
          for result in "$METADATA_RESULT" "$QUALITY_RESULT" "$TEST_RESULT"; do
            if [[ "$result" != "success" ]]; then
              echo "Required CI dependency concluded: $result" >&2
              exit 1
            fi
          done
