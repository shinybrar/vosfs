name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  matrix:
    name: Resolve test matrix
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - name: Resolve matrix for the triggering event
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          # Pull requests validate the fast path: Python 3.12 across all three
          # operating systems. Pushes to main and manual dispatches expand Linux
          # to the full supported Python range (3.10-3.14).
          pull_request='{"include":[
            {"os":"ubuntu-latest","python":"3.12"},
            {"os":"macos-latest","python":"3.12"},
            {"os":"windows-latest","python":"3.12"}
          ]}'
          full='{"include":[
            {"os":"ubuntu-latest","python":"3.10"},
            {"os":"ubuntu-latest","python":"3.11"},
            {"os":"ubuntu-latest","python":"3.12"},
            {"os":"ubuntu-latest","python":"3.13"},
            {"os":"ubuntu-latest","python":"3.14"},
            {"os":"macos-latest","python":"3.12"},
            {"os":"windows-latest","python":"3.12"}
          ]}'
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            matrix="$pull_request"
          else
            matrix="$full"
          fi
          echo "matrix=$(jq -c . <<<"$matrix")" >> "$GITHUB_OUTPUT"

  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Check exact lockfile
        run: uv lock --check

      - name: Run all pre-commit hooks
        run: uv run --all-packages pre-commit run --all-files

      - name: Build strict documentation
        run: uv run zensical build --strict --clean

      - name: Build vosfs distributions
        run: uv build --no-sources --package vosfs --out-dir dist/vosfs

      - name: Build fsspec-cli wheel
        run: uv build --no-sources --package fsspec-cli --wheel --out-dir dist/fsspec-cli

      - name: Build fsspec-cli source distribution
        run: uv build --no-sources --package fsspec-cli --sdist --out-dir dist/fsspec-cli

  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python }})
    needs: matrix
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix.outputs.matrix) }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-suffix: py${{ matrix.python }}
          python-version: ${{ matrix.python }}

      - name: Run deterministic offline tests
        run: uv run pytest

      - name: Run fsspec-cli package tests
        run: uv run --package fsspec-cli pytest src/fsspec-cli/tests

  fsspec-cli-wheel:
    name: Installed fsspec-cli wheel (${{ matrix.os }}, Python ${{ matrix.python }})
    needs: matrix
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix.outputs.matrix) }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-suffix: py${{ matrix.python }}
          python-version: ${{ matrix.python }}

      - name: Test installed wheels outside the workspace
        run: >-
          uv run --no-project --python ${{ matrix.python }} python
          src/fsspec-cli/tests/_installed_wheel_gate.py

  live-integration:
    name: Live OpenCADC integration gate
    # Runs on trusted default-branch pushes and manual dispatch, never on pull
    # requests (no pull_request_target). Secrets are never exposed to forks.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VOSFS_TEST_ENDPOINT: ${{ vars.VOSFS_TEST_ENDPOINT || 'https://staging.canfar.net/arc' }}
      VOSFS_TEST_ROOT: ${{ vars.VOSFS_TEST_ROOT || format('/home/{0}', secrets.CADC_USERNAME) }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Mint a short-lived proxy certificate
        env:
          CADC_USERNAME: ${{ secrets.CADC_USERNAME }}
          CADC_PASSWORD: ${{ secrets.CADC_PASSWORD }}
        run: |
          set -euo pipefail
          umask 077
          netrc="$RUNNER_TEMP/.netrc"
          printf 'machine ws.cadc-ccda.hia-iha.nrc-cnrc.gc.ca login %s password %s\n' \
            "$CADC_USERNAME" "$CADC_PASSWORD" > "$netrc"
          chmod 600 "$netrc"
          uv run --with cadcutils cadc-get-cert \
            --netrc-file "$netrc" \
            --cert-filename "$RUNNER_TEMP/proxy.pem" \
            --days-valid 1 \
            --quiet
          chmod 600 "$RUNNER_TEMP/proxy.pem"
          rm -f "$netrc"

      - name: Run the credential-gated live suite
        env:
          VOSFS_CERT_FILE: ${{ runner.temp }}/proxy.pem
        run: uv run --with cadcutils pytest --no-cov -m integration

      - name: Remove the proxy certificate
        if: always()
        run: rm -f "$RUNNER_TEMP/proxy.pem" "$RUNNER_TEMP/.netrc"

  required:
    name: Required
    if: always()
    needs: [matrix, quality, test, fsspec-cli-wheel, live-integration]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require every dependency to succeed
        env:
          MATRIX_RESULT: ${{ needs.matrix.result }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          TEST_RESULT: ${{ needs.test.result }}
          WHEEL_RESULT: ${{ needs.fsspec-cli-wheel.result }}
          LIVE_RESULT: ${{ needs.live-integration.result }}
        run: |
          for result in "$MATRIX_RESULT" "$QUALITY_RESULT" "$TEST_RESULT" "$WHEEL_RESULT"; do
            if [[ "$result" != "success" ]]; then
              echo "Required CI dependency concluded: $result" >&2
              exit 1
            fi
          done
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            test "$LIVE_RESULT" = "skipped"
          elif [[ "$LIVE_RESULT" != "success" ]]; then
            echo "Live OpenCADC integration concluded: $LIVE_RESULT" >&2
            exit 1
          fi
