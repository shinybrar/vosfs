name: fsspec-cli live OpenCADC

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      ci_run_id:
        description: Successful current-main CI run ID to observe
        required: true
        type: string

permissions:
  actions: read
  contents: read

jobs:
  observe:
    name: Read-only plain ls
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VOSFS_TEST_ENDPOINT: ${{ vars.VOSFS_TEST_ENDPOINT || 'https://staging.canfar.net/arc' }}
      FSSPEC_CLI_LIVE_DIRECTORY: ${{ vars.FSSPEC_CLI_LIVE_DIRECTORY }}
      FSSPEC_CLI_LIVE_SERVICE_ENVIRONMENT: ${{ vars.FSSPEC_CLI_LIVE_SERVICE_ENVIRONMENT || 'OpenCADC staging' }}
      VOSFS_CADC_CREDENTIAL_HOST: ${{ vars.VOSFS_CADC_CREDENTIAL_HOST || 'ws.cadc-ccda.hia-iha.nrc-cnrc.gc.ca' }}
    steps:
      - name: Initialize sanitized fallback evidence
        id: fallback
        run: |
          set -euo pipefail
          [[ "$GITHUB_SHA" =~ ^[0-9a-f]{40}$ ]]
          EVIDENCE_FILE="$RUNNER_TEMP/fsspec-cli-live-evidence-$GITHUB_SHA.json"
          jq -n \
            --arg commit "$GITHUB_SHA" \
            --arg observed_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg run_url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            '{
              schema_version: 1,
              classification: "unverified",
              reason: "setup",
              gate_kind: "live OpenCADC",
              commit: $commit,
              run_url: $run_url,
              ci_run_id: "unavailable",
              ci_run_url: "unavailable",
              observed_at: $observed_at
            }' > "$EVIDENCE_FILE"
          echo "evidence_file=$EVIDENCE_FILE" >> "$GITHUB_OUTPUT"

      - name: Select successful current-main CI run
        id: selection
        env:
          EVENT_CI_RUN_ID: ${{ github.event.workflow_run.id }}
          EVIDENCE_FILE: ${{ steps.fallback.outputs.evidence_file }}
          GH_TOKEN: ${{ github.token }}
          MANUAL_CI_RUN_ID: ${{ inputs.ci_run_id }}
        run: |
          set -euo pipefail
          echo "selected=false" >> "$GITHUB_OUTPUT"
          echo "commit=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          echo "evidence_file=$EVIDENCE_FILE" >> "$GITHUB_OUTPUT"

          if [[ "$GITHUB_EVENT_NAME" == "workflow_run" ]]; then
            CI_RUN_ID="$EVENT_CI_RUN_ID"
          elif [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && "$GITHUB_REF" == "refs/heads/main" ]]; then
            CI_RUN_ID="$MANUAL_CI_RUN_ID"
          else
            exit 0
          fi
          [[ "$CI_RUN_ID" =~ ^[0-9]+$ ]] || exit 0

          RUN_RESPONSE="$RUNNER_TEMP/fsspec-cli-live-run.json"
          MAIN_RESPONSE="$RUNNER_TEMP/fsspec-cli-live-main.json"
          TEMP_SELECTED_EVIDENCE="$RUNNER_TEMP/fsspec-cli-live-selected-evidence.json"
          trap 'rm -f "$RUN_RESPONSE" "$MAIN_RESPONSE" "$TEMP_SELECTED_EVIDENCE"' EXIT
          gh api "repos/$GITHUB_REPOSITORY/actions/runs/$CI_RUN_ID" \
            > "$RUN_RESPONSE" 2>/dev/null || exit 0
          gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/main" \
            > "$MAIN_RESPONSE" 2>/dev/null || exit 0

          jq -e '
            .name == "CI" and
            .conclusion == "success" and
            .head_branch == "main" and
            (.head_sha | test("^[0-9a-f]{40}$"))
          ' "$RUN_RESPONSE" >/dev/null || exit 0
          HEAD_SHA="$(jq -r .head_sha "$RUN_RESPONSE")"
          MAIN_SHA="$(jq -r .object.sha "$MAIN_RESPONSE")"
          [[ "$MAIN_SHA" =~ ^[0-9a-f]{40}$ ]] || exit 0
          [[ "$HEAD_SHA" == "$MAIN_SHA" ]] || exit 0

          SELECTED_EVIDENCE="$RUNNER_TEMP/fsspec-cli-live-evidence-$HEAD_SHA.json"
          jq \
            --arg commit "$HEAD_SHA" \
            --arg ci_run_id "$CI_RUN_ID" \
            --arg ci_run_url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$CI_RUN_ID" \
            '.commit = $commit |
             .ci_run_id = $ci_run_id |
             .ci_run_url = $ci_run_url' \
            "$EVIDENCE_FILE" > "$TEMP_SELECTED_EVIDENCE"
          mv "$TEMP_SELECTED_EVIDENCE" "$SELECTED_EVIDENCE"
          echo "selected=true" >> "$GITHUB_OUTPUT"
          echo "commit=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "ci_run_id=$CI_RUN_ID" >> "$GITHUB_OUTPUT"
          echo "evidence_file=$SELECTED_EVIDENCE" >> "$GITHUB_OUTPUT"

      - name: Check out selected CI commit
        id: checkout
        if: steps.selection.outputs.selected == 'true'
        continue-on-error: true
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          ref: ${{ steps.selection.outputs.commit }}

      - name: Verify checked-out commit
        id: checkout_sha
        if: steps.checkout.outcome == 'success'
        continue-on-error: true
        env:
          SELECTED_COMMIT: ${{ steps.selection.outputs.commit }}
        run: |
          set -euo pipefail
          [[ "$(git rev-parse HEAD)" == "$SELECTED_COMMIT" ]]

      - name: Install uv and Python
        id: setup_uv
        if: steps.checkout_sha.outcome == 'success'
        continue-on-error: true
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false
          python-version: "3.12"

      - name: Build exact wheels and copy sanitized gate
        id: build
        if: steps.setup_uv.outcome == 'success'
        continue-on-error: true
        run: |
          set -euo pipefail
          CLI_DIST="$RUNNER_TEMP/fsspec-cli-live-cli-dist"
          VOSFS_DIST="$RUNNER_TEMP/fsspec-cli-live-vosfs-dist"
          LIVE_GATE="$RUNNER_TEMP/fsspec-cli-live-gate.py"
          RUNTIME_REQUIREMENTS="$RUNNER_TEMP/fsspec-cli-live-runtime-requirements.txt"
          CREDENTIAL_REQUIREMENTS="$RUNNER_TEMP/fsspec-cli-live-credential-requirements.txt"
          mkdir -p "$CLI_DIST" "$VOSFS_DIST"
          cp src/fsspec-cli/tests/_live_opencadc_gate.py "$LIVE_GATE"
          uv lock --check >/dev/null 2>&1
          uv export --frozen --all-packages \
            --no-dev --no-emit-workspace --no-header --no-annotate \
            --output-file "$RUNTIME_REQUIREMENTS" >/dev/null 2>&1
          uv export --frozen --only-group live \
            --no-emit-workspace --no-header --no-annotate \
            --output-file "$CREDENTIAL_REQUIREMENTS" >/dev/null 2>&1
          uv build --package fsspec-cli --wheel --out-dir "$CLI_DIST" \
            >/dev/null 2>&1
          uv build --package vosfs --wheel --out-dir "$VOSFS_DIST" \
            >/dev/null 2>&1
          CLI_WHEELS=("$CLI_DIST"/*.whl)
          VOSFS_WHEELS=("$VOSFS_DIST"/*.whl)
          [[ "${#CLI_WHEELS[@]}" == "1" ]]
          [[ "${#VOSFS_WHEELS[@]}" == "1" ]]
          [[ -f "${CLI_WHEELS[0]}" ]]
          [[ -f "${VOSFS_WHEELS[0]}" ]]
          echo "cli_wheel=${CLI_WHEELS[0]}" >> "$GITHUB_OUTPUT"
          echo "vosfs_wheel=${VOSFS_WHEELS[0]}" >> "$GITHUB_OUTPUT"
          echo "live_gate=$LIVE_GATE" >> "$GITHUB_OUTPUT"
          echo "runtime_requirements=$RUNTIME_REQUIREMENTS" >> "$GITHUB_OUTPUT"
          echo "credential_requirements=$CREDENTIAL_REQUIREMENTS" >> "$GITHUB_OUTPUT"

      - name: Install wheels outside the repository
        id: install
        if: steps.build.outcome == 'success'
        continue-on-error: true
        env:
          CLI_WHEEL: ${{ steps.build.outputs.cli_wheel }}
          CREDENTIAL_REQUIREMENTS: ${{ steps.build.outputs.credential_requirements }}
          RUNTIME_REQUIREMENTS: ${{ steps.build.outputs.runtime_requirements }}
          VOSFS_WHEEL: ${{ steps.build.outputs.vosfs_wheel }}
        run: |
          set -euo pipefail
          LIVE_ENVIRONMENT="$RUNNER_TEMP/fsspec-cli-live-environment"
          LIVE_PYTHON="$LIVE_ENVIRONMENT/bin/python"
          CREDENTIAL_ENVIRONMENT="$RUNNER_TEMP/fsspec-cli-live-credential-environment"
          CREDENTIAL_PYTHON="$CREDENTIAL_ENVIRONMENT/bin/python"
          uv venv "$LIVE_ENVIRONMENT" --python 3.12 >/dev/null 2>&1
          uv venv "$CREDENTIAL_ENVIRONMENT" --python 3.12 >/dev/null 2>&1
          uv pip install --python "$LIVE_PYTHON" \
            --require-hashes --requirements "$RUNTIME_REQUIREMENTS" \
            >/dev/null 2>&1
          uv pip install --python "$LIVE_PYTHON" --no-deps \
            "$CLI_WHEEL" "$VOSFS_WHEEL" >/dev/null 2>&1
          uv pip check --python "$LIVE_PYTHON" >/dev/null 2>&1
          uv pip install --python "$CREDENTIAL_PYTHON" \
            --require-hashes --requirements "$CREDENTIAL_REQUIREMENTS" \
            >/dev/null 2>&1
          uv pip check --python "$CREDENTIAL_PYTHON" >/dev/null 2>&1
          [[ -x "$CREDENTIAL_ENVIRONMENT/bin/cadc-get-cert" ]]
          echo "live_python=$LIVE_PYTHON" >> "$GITHUB_OUTPUT"
          echo "cadc_get_cert=$CREDENTIAL_ENVIRONMENT/bin/cadc-get-cert" >> "$GITHUB_OUTPUT"

      - name: Mint one-day proxy certificate
        id: authentication
        if: steps.install.outcome == 'success'
        continue-on-error: true
        env:
          CADC_GET_CERT: ${{ steps.install.outputs.cadc_get_cert }}
          CADC_HOST: ${{ env.VOSFS_CADC_CREDENTIAL_HOST }}
          CADC_USERNAME: ${{ secrets.CADC_USERNAME }}
          CADC_PASSWORD: ${{ secrets.CADC_PASSWORD }}
          EVIDENCE_FILE: ${{ steps.selection.outputs.evidence_file }}
        run: |
          set -euo pipefail
          NETRC_FILE="$RUNNER_TEMP/fsspec-cli-live.netrc"
          PROXY_FILE="$RUNNER_TEMP/fsspec-cli-live-proxy.pem"
          DIRECTORY_FILE="$RUNNER_TEMP/fsspec-cli-live-directory"
          TEMP_EVIDENCE="$RUNNER_TEMP/fsspec-cli-live-auth-evidence.json"
          jq '.reason = "authentication"' "$EVIDENCE_FILE" > "$TEMP_EVIDENCE"
          mv "$TEMP_EVIDENCE" "$EVIDENCE_FILE"
          [[ -x "$CADC_GET_CERT" ]]
          [[ "$CADC_HOST" =~ ^[A-Za-z0-9.-]+$ ]]
          [[ -n "$CADC_USERNAME" ]]
          [[ -n "$CADC_PASSWORD" ]]
          umask 077
          install -m 600 /dev/null "$NETRC_FILE"
          printf 'machine %s login %s password %s\n' \
            "$CADC_HOST" "$CADC_USERNAME" "$CADC_PASSWORD" > "$NETRC_FILE"
          chmod 600 "$NETRC_FILE"
          LIVE_DIRECTORY="$FSSPEC_CLI_LIVE_DIRECTORY"
          if [[ -z "$LIVE_DIRECTORY" ]]; then
            LIVE_DIRECTORY="/home/$CADC_USERNAME"
          fi
          printf '%s' "$LIVE_DIRECTORY" > "$DIRECTORY_FILE"
          chmod 600 "$DIRECTORY_FILE"
          "$CADC_GET_CERT" \
            --host "$CADC_HOST" \
            --netrc-file "$NETRC_FILE" \
            --cert-filename "$PROXY_FILE" \
            --days-valid 1 \
            --quiet >/dev/null 2>&1
          chmod 600 "$PROXY_FILE"

      - name: Run one sanitized read-only plain ls
        id: observation
        if: steps.authentication.outcome == 'success'
        continue-on-error: true
        env:
          CLI_WHEEL: ${{ steps.build.outputs.cli_wheel }}
          EVIDENCE_FILE: ${{ steps.selection.outputs.evidence_file }}
          FSSPEC_CLI_LIVE_CI_RUN_ID: ${{ steps.selection.outputs.ci_run_id }}
          FSSPEC_CLI_LIVE_COMMIT: ${{ steps.selection.outputs.commit }}
          FSSPEC_CLI_LIVE_LOCK_IDENTITY: uv.lock@${{ steps.selection.outputs.commit }}
          FSSPEC_CLI_LIVE_SERVICE_ENVIRONMENT: ${{ env.FSSPEC_CLI_LIVE_SERVICE_ENVIRONMENT }}
          LIVE_GATE: ${{ steps.build.outputs.live_gate }}
          LIVE_PYTHON: ${{ steps.install.outputs.live_python }}
          VOSFS_WHEEL: ${{ steps.build.outputs.vosfs_wheel }}
        run: |
          set -euo pipefail
          LIVE_WORK="$RUNNER_TEMP/fsspec-cli-live-work"
          CANDIDATE_EVIDENCE="$RUNNER_TEMP/fsspec-cli-live-candidate.json"
          INVALID_EVIDENCE="$RUNNER_TEMP/fsspec-cli-live-invalid.json"
          mkdir -p "$LIVE_WORK"
          export FSSPEC_CLI_LIVE_ENDPOINT="$VOSFS_TEST_ENDPOINT"
          export FSSPEC_CLI_LIVE_DIRECTORY="$(< "$RUNNER_TEMP/fsspec-cli-live-directory")"
          export FSSPEC_CLI_REPOSITORY_ROOT="$GITHUB_WORKSPACE"
          export FSSPEC_CLI_LIVE_CLI_WHEEL="$CLI_WHEEL"
          export FSSPEC_CLI_LIVE_VOSFS_WHEEL="$VOSFS_WHEEL"
          export VOSFS_CERT_FILE="$RUNNER_TEMP/fsspec-cli-live-proxy.pem"

          set +e
          (
            cd "$LIVE_WORK"
            env -u PYTHONPATH "$LIVE_PYTHON" -I "$LIVE_GATE"
          ) > "$CANDIDATE_EVIDENCE" 2>/dev/null
          GATE_STATUS=$?
          set -e

          if jq -e \
            --arg commit "$FSSPEC_CLI_LIVE_COMMIT" \
            --arg ci_run_id "$FSSPEC_CLI_LIVE_CI_RUN_ID" \
            --arg ci_run_url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$FSSPEC_CLI_LIVE_CI_RUN_ID" \
            --arg lock_identity "$FSSPEC_CLI_LIVE_LOCK_IDENTITY" \
            --arg run_url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --arg service_environment "$FSSPEC_CLI_LIVE_SERVICE_ENVIRONMENT" \
            --argjson gate_status "$GATE_STATUS" \
            'type == "object" and
             (keys == [
               "call_shape", "ci_run_id", "ci_run_url", "classification",
               "cleanup", "command_exit", "command_profile", "commit",
               "gate_kind", "installation", "lock_identity", "observed_at",
               "output", "packages", "platform", "python", "reason",
               "run_url", "runner", "schema_version", "service_environment",
               "source_mode", "stderr"
             ]) and
             .schema_version == 1 and
             .gate_kind == "live OpenCADC" and
             .command_profile == "plain ls" and
             .source_mode == "vosfs / native async" and
             (.reason | type == "string") and
             (.observed_at | type == "string") and
             (.python | type == "string") and
             (.installation | type == "string") and
             (.stderr | type == "string") and
             (.output | type == "string") and
             (.call_shape | type == "string") and
             (.cleanup | type == "string") and
             (.command_exit == null or (.command_exit | type == "number")) and
             (.packages |
               type == "object" and
               (keys == ["fsspec", "fsspec-cli", "typer", "vosfs"]) and
               (all(.[]; type == "string"))) and
             (.platform |
               type == "object" and
               (keys == ["machine", "release", "system"]) and
               (all(.[]; type == "string"))) and
             (.runner |
               type == "object" and
               (keys == ["architecture", "image", "image_version", "operating_system"]) and
               (all(.[]; type == "string"))) and
             .commit == $commit and
             .lock_identity == $lock_identity and
             .run_url == $run_url and
             .ci_run_id == $ci_run_id and
             .ci_run_url == $ci_run_url and
             (.service_environment == $service_environment or
              .service_environment == "unverified") and
             ((.classification == "pass" and
               $gate_status == 0 and
               .command_exit == 0 and
               .installation == "exact wheels / isolated" and
               .service_environment == $service_environment and
               .stderr == "empty" and
               .output == "nonempty-valid" and
               .call_shape == "_info then _ls(detail=False)" and
               .cleanup == "awaited-success") or
              (.classification == "fail" and $gate_status == 1) or
              (.classification == "unverified" and $gate_status == 2))' \
            "$CANDIDATE_EVIDENCE" >/dev/null 2>&1; then
            jq -c . "$CANDIDATE_EVIDENCE" > "$EVIDENCE_FILE"
          else
            jq \
              '.classification = "fail" |
               .reason = "gate_internal_error"' \
              "$EVIDENCE_FILE" > "$INVALID_EVIDENCE"
            mv "$INVALID_EVIDENCE" "$EVIDENCE_FILE"
          fi
          exit "$GATE_STATUS"

      - name: Remove temporary credential material
        if: always()
        run: |
          rm -f \
            "$RUNNER_TEMP/fsspec-cli-live.netrc" \
            "$RUNNER_TEMP/fsspec-cli-live-proxy.pem" \
            "$RUNNER_TEMP/fsspec-cli-live-directory"

      - name: Append sanitized evidence summary
        if: always()
        env:
          EVIDENCE_FILE: ${{ steps.selection.outputs.evidence_file }}
        run: |
          set -euo pipefail
          {
            echo "### fsspec-cli live OpenCADC"
            echo '```json'
            jq -c . "$EVIDENCE_FILE"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload sanitized live evidence
        id: upload
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fsspec-cli-live-evidence-${{ steps.selection.outputs.commit }}
          path: ${{ steps.selection.outputs.evidence_file }}
          if-no-files-found: error
          retention-days: 90

      - name: Enforce live classification
        if: always()
        env:
          EVIDENCE_FILE: ${{ steps.selection.outputs.evidence_file }}
          OBSERVATION_OUTCOME: ${{ steps.observation.outcome }}
          UPLOAD_OUTCOME: ${{ steps.upload.outcome }}
        run: |
          set -euo pipefail
          [[ "$UPLOAD_OUTCOME" == "success" ]]
          [[ "$OBSERVATION_OUTCOME" == "success" ]]
          [[ "$(jq -r .classification "$EVIDENCE_FILE")" == "pass" ]]
