name: Publish fsspec-cli

on:
  repository_dispatch:
    types: [fsspec-cli-release-build]

permissions:
  contents: read

concurrency:
  group: fsspec-cli-release-${{ github.event.client_payload.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Validate release dispatch
        id: dispatch
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ github.event.client_payload.sha }}
          RELEASE_TAG: ${{ github.event.client_payload.tag_name }}
        run: |
          set -euo pipefail
          if [[ "$GITHUB_RUN_ATTEMPT" != "1" ]]; then
            echo "failed fsspec-cli releases are not resumed; publish the next patch" >&2
            exit 1
          fi
          if [[ ! "$RELEASE_TAG" =~ ^fsspec-cli-v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "release tag must be an exact fsspec-cli-vX.Y.Z tag" >&2
            exit 1
          fi
          if [[ ! "$RELEASE_SHA" =~ ^([0-9a-f]{40})$ ]]; then
            echo "release dispatch requires a full commit SHA" >&2
            exit 1
          fi
          release_is_draft="$(gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft)"
          if [[ "$release_is_draft" != "true" ]]; then
            echo "release $RELEASE_TAG is not the draft created by this release run" >&2
            exit 1
          fi
          echo "is_draft=$release_is_draft" >> "$GITHUB_OUTPUT"

      - name: Check out the released tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.client_payload.tag_name }}

      - name: Install uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false
          python-version: "3.12"

      - name: Verify released commit and draft
        env:
          IS_DRAFT: ${{ steps.dispatch.outputs.is_draft }}
          RELEASE_SHA: ${{ github.event.client_payload.sha }}
          RELEASE_TAG: ${{ github.event.client_payload.tag_name }}
        run: |
          set -euo pipefail
          CHECKED_OUT_SHA="$(git rev-parse HEAD)"
          uv run --no-project --python 3.12 python \
            src/fsspec-cli/tools/verify_release.py dispatch \
            --tag "$RELEASE_TAG" \
            --release-sha "$RELEASE_SHA" \
            --checkout-sha "$CHECKED_OUT_SHA" \
            --is-draft "$IS_DRAFT"

      - name: Build fsspec-cli distributions
        run: uv build --package fsspec-cli --out-dir dist/fsspec-cli

      - name: Verify fsspec-cli distributions
        env:
          RELEASE_TAG: ${{ github.event.client_payload.tag_name }}
        run: |
          uv run --no-project --python 3.12 python \
            src/fsspec-cli/tools/verify_release.py artifacts \
            --tag "$RELEASE_TAG" \
            --dist-dir dist/fsspec-cli

      - name: Attach fsspec-cli distributions
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.client_payload.tag_name }}
        run: |
          gh release upload "$RELEASE_TAG" \
            dist/fsspec-cli/*.whl \
            dist/fsspec-cli/*.tar.gz

      - name: Publish the complete fsspec-cli release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.client_payload.tag_name }}
        run: gh release edit "$RELEASE_TAG" --draft=false
