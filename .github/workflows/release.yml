name: Release

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  orchestrate:
    permissions:
      contents: write
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Open or update release pull requests
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          target-branch: main
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Dispatch vosfs package publication
        if: steps.release.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ steps.release.outputs.sha }}
          RELEASE_TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          gh api --method POST "repos/$GITHUB_REPOSITORY/dispatches" \
            -f event_type=package-release \
            -f "client_payload[package]=vosfs" \
            -f "client_payload[tag_name]=$RELEASE_TAG" \
            -f "client_payload[sha]=$RELEASE_SHA"

      - name: Dispatch fsspec-cli package publication
        if: steps.release.outputs['src/fsspec-cli--release_created'] == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ steps.release.outputs['src/fsspec-cli--sha'] }}
          RELEASE_TAG: ${{ steps.release.outputs['src/fsspec-cli--tag_name'] }}
        run: |
          gh api --method POST "repos/$GITHUB_REPOSITORY/dispatches" \
            -f event_type=package-release \
            -f "client_payload[package]=fsspec-cli" \
            -f "client_payload[tag_name]=$RELEASE_TAG" \
            -f "client_payload[sha]=$RELEASE_SHA"

      - name: Dispatch dev documentation
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST "repos/$GITHUB_REPOSITORY/dispatches" \
            -f event_type=docs-publish \
            -f "client_payload[target]=dev" \
            -f "client_payload[sha]=${{ github.sha }}"
